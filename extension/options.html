<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eureka 设置</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="options-shell">
      <header>
        <h1>Eureka 设置</h1>
        <p>配置本地后端、默认模型和隐私说明。</p>
      </header>

      <label>
        后端地址
        <input id="apiEndpointInput" type="url" value="http://127.0.0.1:8000">
      </label>

      <label>
        默认模型
        <select id="defaultProviderSelect">
          <option value="demo">Demo Offline Model</option>
          <option value="deepseek">DeepSeek</option>
          <option value="qwen">Qwen</option>
          <option value="kimi">Kimi</option>
          <option value="zhipu">Zhipu GLM</option>
          <option value="openai">OpenAI</option>
          <option value="custom">Custom</option>
        </select>
      </label>

      <label>
        默认模板
        <select id="defaultTemplateSelect">
          <option value="summary">网页总结</option>
          <option value="study_note">学习笔记</option>
          <option value="tech_research">技术调研</option>
          <option value="product_compare">竞品分析</option>
          <option value="paper_reading">论文阅读</option>
        </select>
      </label>

      <section class="notice">
        <h2>隐私说明</h2>
        <p>插件只在你点击“开始调研”时读取当前标签页正文，并发送到你配置的本地 Eureka 后端。插件不收集账号、密码、Cookie 或浏览历史。</p>
      </section>

      <div class="actions">
        <button id="saveButton">保存设置</button>
        <button id="resetButton" type="button">恢复默认</button>
      </div>
      <p id="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
